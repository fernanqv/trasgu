[build-system]
requires = ["setuptools>=60"]
build-backend = "setuptools.build_meta"

[project]
name = "chimera_vines"
version = "0.1.0"
description = "Vine copula fitting over Chimera Zarr structures"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "GPL-3.0-only" }
classifiers = [
    "Programming Language :: Python :: 3 :: Only",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]

dependencies = [
  "numpy>=1.23",
  "PyYAML>=6.0",
  "zarr>=2.16",
  "fsspec[http]>=2023.6.0",
  "pyvinecopulib>=0.6.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=7",
  "ruff>=0.5",
  "black>=24.0",
]

[project.scripts]
chimera-fit-all = "run_fit_all_chunks:main"
chimera-submit-slurm = "submit_all_chunks_slurm:main"
chimera-combine = "combine_chunks_results:main"
chimera-monitor = "monitor_chunks:main"
chimera-fit-chunk = "fit_vinecop_chunk:main"

[tool.setuptools]
py-modules = ["chimera_vines", "run_fit_all_chunks", "submit_all_chunks_slurm", "combine_chunks_results", "monitor_chunks", "fit_vinecop_chunk"]
