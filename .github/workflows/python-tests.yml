name: Python Tests

on:
  pull_request:
    branches:
      - develop
    types:
      - opened
      - synchronize
  workflow_dispatch:

jobs:
  python-tests:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true

      - name: Create conda environment
        run: conda create -n trasgu python=${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          source $CONDA/etc/profile.d/conda.sh
          conda activate trasgu
          pip install -e .[dev]

      - name: Run Ruff
        run: |
          source $CONDA/etc/profile.d/conda.sh
          conda activate trasgu
          ruff check .

      - name: Run tests
        run: |
          source $CONDA/etc/profile.d/conda.sh
          conda activate trasgu
          pytest
